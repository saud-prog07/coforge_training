<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Grid</title>

    <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <link rel="stylesheet" href="AssignmentProblem4style.css">
</head>
<body>

<div class="container">

    <div class="row">
        <div class="col-md-12 box header">
            Header
        </div>
    </div>

    <div class="row">

        <div class="col-md-4">
            <div class="box column1">
                Column 1
            </div>
        </div>

        <div class="col-md-4">
            <div class="box column2">
                Column 2
            </div>
        </div>

        <div class="col-md-4">
            <div class="box column3">
                Column 3
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row">
        <div class="col-md-12 box footer">
            Footer
        </div>
    </div>

</div>

</body>
</html>
