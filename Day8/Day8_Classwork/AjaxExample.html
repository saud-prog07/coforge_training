<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="AssingmetProblem3.css">
    <script type="text/javascript">

    function passwordstrenght() {

        var password = document.getElementById("pwd").value;

        var req = new XMLHttpRequest();

        req.open("GET",
        "http://localhost:8081/MyWebApplication/PasswordStrengthServlet?pwd=" + password,
        true);

        req.onreadystatechange = function() {

  
            if(req.readyState == 4 && req.status == 200) {

                document.getElementById("result").innerHTML = req.responseText;

            }

        }

        req.send();

    }

    </script>
</head>
<body>

<form>
<table>

<tr>
    <th colspan="2" class="title">Registration Form</th>
</tr>

<tr>
    <td>Student Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Father's Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Mother's Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Date of Birth</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Gender</td>
<td>
    <div class="gender">
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
    </div>
</td>
</tr>

<tr>
    <td>Email ID</td>
    <td><input type="email"></td>
</tr>

<tr>
<td>Password</td>
<td>
    <input type="password" id="pwd" onkeyup="passwordstrenght()">
    <span id="result"></span>
</td>
</tr>

<tr>
    <td>Mobile No.</td>
    <td><input type="tel"></td>
</tr>

<tr>
    <td>Address</td>
    <td><textarea rows="5" cols="30"></textarea></td>
</tr>

<tr>
    <td>State</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>City</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td></td>
    <td><input type="submit" value="Submit"></td>
</tr>

</table>
</form>
</body>
</html>
