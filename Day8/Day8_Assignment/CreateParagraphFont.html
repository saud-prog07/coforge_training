!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Increase Font Size</title>
<script>
function increaseFont() {
    document.getElementById("para").style.fontSize = "30px";
}
</script>
</head>
<body>
<h2>Increase Font Size</h2>

<p id="para">
    This is a sample paragraph. Click the button to increase its font size.
</p>

<button onclick="increaseFont()">Increase Font Size</button>
</body>
</html>
